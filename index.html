<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <title>آية اليوم - كتابك المقدس</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- كود Progressier -->
    <link rel="manifest" href="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/progressier.json"/>
    <script defer src="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/script.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root { 
            --primary: #2c3e50; 
            --accent: #d35400; 
            --white: #ffffff;
            --gold: #c9a03d;
        }
        
        body { 
            font-family: 'Amiri', serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        
        .card { 
            background: rgba(255,255,255,0.95); 
            padding: 35px 25px; 
            border-radius: 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            text-align: center; 
            max-width: 500px; 
            width: 100%; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .sub {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            display: inline-block;
            padding-bottom: 5px;
        }
        
        .verse-text { 
            font-size: 1.6rem; 
            color: #222; 
            margin: 20px 0; 
            font-weight: bold; 
            line-height: 1.7; 
            min-height: 100px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 20px;
            border-right: 5px solid var(--gold);
        }
        
        .verse-ref { 
            color: var(--gold); 
            font-size: 1.1rem; 
            margin-bottom: 20px; 
            font-weight: bold; 
        }
        
        .time-input { 
            font-size: 1.2rem; 
            padding: 12px; 
            border: 2px solid var(--primary); 
            border-radius: 50px; 
            width: 85%; 
            margin: 15px 0; 
            text-align: center; 
            color: var(--primary); 
            font-family: 'Amiri', serif;
        }
        
        .btn { 
            background: linear-gradient(135deg, var(--primary), #1a252f);
            color: white; 
            border: none; 
            padding: 14px 25px; 
            border-radius: 50px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1.1rem; 
            font-family: 'Amiri', serif; 
            transition: all 0.3s ease;
            margin-top: 5px;
        }
        
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: rgba(44,62,80,0.1);
        }
        
        #status { 
            color: #27ae60; 
            margin-top: 15px; 
            font-weight: bold; 
            padding: 8px;
            border-radius: 50px;
            background: #e8f5e9;
            display: none;
        }
        
        #status.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        hr {
            margin: 20px 0;
            border: 0;
            border-top: 1px solid #eee;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .card { padding: 25px 20px; }
            .verse-text { font-size: 1.3rem; padding: 15px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>📖 آية اليوم</h1>
    <div class="sub">كلمة الله لك كل يوم</div>
    
    <div id="verse-box">
        <div class="verse-text" id="v-text">
            <span class="loading"></span> جاري تحميل الآية...
        </div>
        <div class="verse-ref" id="v-ref"></div>
    </div>
    
    <hr>
    <p style="font-weight: bold; color: var(--primary);">⏰ حدد وقت التذكير اليومي:</p>
    <input type="time" id="notify-time" class="time-input" value="08:00">
    <button class="btn" onclick="setupReminder()">🔔 فعّل الإشعارات اليومية</button>
    <button class="btn btn-secondary" id="testBtn">✝ جرب التنبيه الآن</button>
    <div id="status"></div>
</div>

<script>
    // آيات احتياطية
    const fallbackVerses = [
        { text: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ. أَيَّدْتُكَ وَأَعَنْتُكَ.", ref: "إشعياء 41:10" },
        { text: "الرَّبُّ رَاعِيَّ فَلاَ يُعْوِزُنِي شَيْءٌ. فِي مَرَاعٍ خُضْرٍ يُرْبِضُنِي.", ref: "مزمور 23:1-2" },
        { text: "أَنَا هُوَ الطَّرِيقُ وَالْحَقُّ وَالْحَيَاةُ. لَيْسَ أَحَدٌ يَأْتِي إِلَى الآبِ إِلاَّ بِي.", ref: "يوحنا 14:6" },
        { text: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", ref: "فيلبي 4:13" },
        { text: "أَحْبَبْتُكَ حُبًّا أَبَدِيًّا. لِذَلِكَ جَذَبْتُكِ بِالرَّحْمَةِ.", ref: "إرميا 31:3" },
        { text: "تَعَالَوْا إِلَيَّ يَا جَمِيعَ الْمُتْعَبِينَ وَالثَّقِيلِي الأَحْمَالِ وَأَنَا أُرِيحُكُمْ.", ref: "متى 11:28" }
    ];

    // دالة اهتزاز
    function vibrate() {
        if (navigator.vibrate) {
            navigator.vibrate([300, 100, 300]);
        }
    }

    // جلب آية من API العربي
    async function fetchVerseFromAPI() {
        const books = Array.from({length: 76}, (_, i) => i + 1);
        const randomBook = books[Math.floor(Math.random() * books.length)];
        const randomChapter = Math.floor(Math.random() * 50) + 1;
        const randomVerse = Math.floor(Math.random() * 30) + 1;
        
        try {
            const response = await fetch(`https://arabic-bible.onrender.com/api?book=${randomBook}&ch=${randomChapter}&ver=${randomVerse}`);
            
            if (!response.ok) throw new Error('API failed');
            
            const data = await response.json();
            
            if (data && data.verse) {
                return {
                    text: data.verse,
                    ref: `${data.bookName || 'الكتاب المقدس'} ${randomChapter}:${randomVerse}`
                };
            }
            throw new Error('No verse data');
            
        } catch(error) {
            console.log("API error, using fallback:", error);
            const fallback = fallbackVerses[Math.floor(Math.random() * fallbackVerses.length)];
            return fallback;
        }
    }

    // تحميل وعرض الآية
    async function loadVerse() {
        const vText = document.getElementById('v-text');
        const vRef = document.getElementById('v-ref');
        
        const verse = await fetchVerseFromAPI();
        
        vText.innerHTML = `"${verse.text}"`;
        vRef.innerHTML = verse.ref;
    }

    // عرض إشعار
    async function sendNotification() {
        const verse = await fetchVerseFromAPI();
        
        if (Notification.permission === "granted") {
            new Notification("📖 آية اليوم لك", {
                body: `"${verse.text.substring(0, 100)}" - ${verse.ref}`,
                icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                vibrate: [200, 100, 200],
                requireInteraction: true
            });
        }
        
        document.getElementById('v-text').innerHTML = `"${verse.text}"`;
        document.getElementById('v-ref').innerHTML = verse.ref;
        
        vibrate();
    }

    // تفعيل التذكير
    function setupReminder() {
        if (!("Notification" in window)) {
            alert("المتصفح لا يدعم الإشعارات");
            return;
        }
        
        if (window.progressier) {
            window.progressier.addPushSubscription();
        }
        
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                const time = document.getElementById('notify-time').value;
                localStorage.setItem('verse_time', time);
                
                const statusDiv = document.getElementById('status');
                statusDiv.innerHTML = `✅ تم التفعيل! ستصل الآية يومياً الساعة ${time}`;
                statusDiv.classList.add('show');
                
                new Notification("✅ تم تفعيل التذكير", {
                    body: `ستصلك آية من الكتاب المقدس يومياً الساعة ${time}`,
                    icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png"
                });
                
                vibrate();
                startChecking();
                
                setTimeout(() => {
                    statusDiv.classList.remove('show');
                }, 4000);
            } else {
                alert("✝ من فضلك اسمح بالإشعارات");
            }
        });
    }

    // تجربة التنبيه
    async function testNotification() {
        console.log("Test button clicked");
        
        if (Notification.permission === "granted") {
            await sendNotification();
        } else if (Notification.permission === "default") {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                await sendNotification();
            } else {
                alert("الرجاء السماح بالإشعارات أولاً");
            }
        } else {
            alert("الإشعارات ممنوعة. الرجاء تغيير الإعدادات من المتصفح");
        }
    }

    // مراقبة الوقت
    let lastNotifiedTime = "";
    let checkInterval = null;
    
    function startChecking() {
        if (checkInterval) clearInterval(checkInterval);
        
        checkInterval = setInterval(async () => {
            const now = new Date();
            const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const targetTime = localStorage.getItem('verse_time');
            
            if (targetTime && currentTime === targetTime && lastNotifiedTime !== currentTime) {
                await sendNotification();
                lastNotifiedTime = currentTime;
            }
            
            if (targetTime && currentTime !== targetTime) {
                lastNotifiedTime = "";
            }
        }, 30000);
    }

    // ربط الزر بالدالة (بدل onclick)
    document.getElementById('testBtn').addEventListener('click', testNotification);

    // تحميل الصفحة
    window.onload = async () => {
        await loadVerse();
        
        const savedTime = localStorage.getItem('verse_time');
        if (savedTime) {
            document.getElementById('notify-time').value = savedTime;
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `✅ النظام نشط - التذكير الساعة ${savedTime}`;
            statusDiv.classList.add('show');
            startChecking();
            
            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 3000);
        }
    };
</script>

</body>
</html>

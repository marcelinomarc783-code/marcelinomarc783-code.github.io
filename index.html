<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <title>آية اليوم - Orthodox</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/progressier.json"/>
    <script defer src="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/script.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #2c3e50; --gold: #c9a03d; }
        body { 
            font-family: 'Amiri', serif; 
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card { 
            background: rgba(255,255,255,0.97); padding: 35px 25px; 
            border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            text-align: center; max-width: 450px; width: 100%;
        }
        h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; }
        .sub { color: #666; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #eee; display: inline-block; padding-bottom: 5px; }
        .verse-box { min-height: 150px; display: flex; flex-direction: column; justify-content: center; }
        .verse-text { 
            font-size: 1.6rem; color: #222; margin: 15px 0; font-weight: bold; line-height: 1.7; 
            background: #f9f9f9; padding: 25px; border-radius: 20px; border-right: 6px solid var(--gold);
        }
        .verse-ref { color: var(--gold); font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; }
        .time-input { 
            font-size: 1.3rem; padding: 12px; border: 2px solid var(--primary); border-radius: 50px; 
            width: 85%; margin: 15px 0; text-align: center; color: var(--primary); font-family: 'Amiri', serif;
        }
        .btn { 
            background: linear-gradient(135deg, var(--primary), #1a252f); color: white; border: none; 
            padding: 15px 25px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 1.1rem; 
            font-family: 'Amiri', serif; transition: 0.3s; margin-top: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:active { transform: scale(0.96); }
        #status { color: #27ae60; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 50px; background: #e8f5e9; display: none; }
        #status.show { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--gold); border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>📖 آية اليوم</h1>
    <div class="sub">تطبيق Orthodox</div>
    
    <div id="verse-box" class="verse-box">
        <div class="verse-text" id="v-text"><span class="loading"></span> جاري تحميل كلمة الله...</div>
        <div class="verse-ref" id="v-ref"></div>
    </div>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    <p style="font-weight: bold; color: var(--primary);">⏰ وقت التذكير اليومي:</p>
    <input type="time" id="notify-time" class="time-input" value="08:00">
    <button class="btn" id="setupBtn">🔔 حفظ وتفعيل الإشعارات</button>
    <div id="status"></div>
</div>

<script>
    // آيات احتياطية
    const fallbackVerses = [
        { text: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ.", ref: "إشعياء 41:10" },
        { text: "الرَّبُّ رَاعِيَّ فَلاَ يُعْوِزُنِي شَيْءٌ.", ref: "مزمور 23:1" },
        { text: "أَنَا هُوَ الطَّرِيقُ وَالْحَقُّ وَالْحَيَاةُ.", ref: "يوحنا 14:6" },
        { text: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", ref: "فيلبي 4:13" }
    ];

    // جلب آية من API
    async function fetchVerse() {
        try {
            const randomBook = Math.floor(Math.random() * 76) + 1;
            const randomChapter = Math.floor(Math.random() * 50) + 1;
            const randomVerse = Math.floor(Math.random() * 30) + 1;
            const res = await fetch(`https://arabic-bible.onrender.com/api?book=${randomBook}&ch=${randomChapter}&ver=${randomVerse}`);
            if (!res.ok) throw new Error('API failed');
            const data = await res.json();
            if (data && data.verse) {
                return { text: data.verse, ref: `${data.bookName || 'الكتاب المقدس'} ${randomChapter}:${randomVerse}` };
            }
            throw new Error('No verse');
        } catch {
            return fallbackVerses[Math.floor(Math.random() * fallbackVerses.length)];
        }
    }

    // تحديث الشاشة بالآية
    async function updateVerseUI() {
        const vText = document.getElementById('v-text');
        const vRef = document.getElementById('v-ref');
        const verse = await fetchVerse();
        vText.innerHTML = `"${verse.text}"`;
        vRef.innerHTML = verse.ref;
    }

    // إرسال إشعار
    async function sendTestNotification() {
        const verse = await fetchVerse();
        if (Notification.permission === "granted") {
            new Notification("📖 آية اليوم", {
                body: `"${verse.text.substring(0, 80)}" - ${verse.ref}`,
                icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                vibrate: [200, 100, 200]
            });
        }
        return verse;
    }

    // حفظ التذكير
    async function setupReminder() {
        console.log("Setup button clicked");
        
        const time = document.getElementById('notify-time').value;
        if (!time) {
            alert("اختر الوقت أولاً");
            return;
        }
        
        // طلب إذن الإشعارات
        let permission = Notification.permission;
        if (permission !== "granted") {
            permission = await Notification.requestPermission();
        }
        
        if (permission === "granted") {
            // حفظ الوقت
            localStorage.setItem('verse_time', time);
            localStorage.setItem('reminder_active', 'true');
            
            // إظهار رسالة النجاح
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `✅ تم الحفظ! ستصلك الآية يومياً الساعة ${time}`;
            statusDiv.classList.add('show');
            
            // اهتزاز
            if (navigator.vibrate) navigator.vibrate(200);
            
            // إشعار تأكيد
            new Notification("✅ تم تفعيل التذكير", {
                body: `ستصلك آية من الكتاب المقدس يومياً الساعة ${time}`,
                icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png"
            });
            
            setTimeout(() => statusDiv.classList.remove('show'), 4000);
            
            // بدء المراقبة
            startChecking();
        } else {
            alert("✝ من فضلك اسمح بالإشعارات من إعدادات المتصفح");
        }
    }

    // مراقبة الوقت
    let lastNotified = "";
    let checkInterval = null;
    
    function startChecking() {
        if (checkInterval) clearInterval(checkInterval);
        
        checkInterval = setInterval(async () => {
            const now = new Date();
            const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            const targetTime = localStorage.getItem('verse_time');
            
            if (targetTime && currentTime === targetTime && lastNotified !== currentTime) {
                const verse = await fetchVerse();
                if (Notification.permission === "granted") {
                    new Notification("📖 آية اليوم", {
                        body: `"${verse.text.substring(0, 80)}" - ${verse.ref}`,
                        icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                        vibrate: [200, 100, 200]
                    });
                }
                lastNotified = currentTime;
            }
            
            if (targetTime && currentTime !== targetTime) {
                lastNotified = "";
            }
        }, 30000);
    }

    // ربط الزر
    document.getElementById('setupBtn').addEventListener('click', setupReminder);
    
    // زر اختبار (خفي) - اضغط 3 مرات على الشاشة عشان يظهر
    let clickCount = 0;
    document.getElementById('verse-box').addEventListener('click', async () => {
        clickCount++;
        if (clickCount === 3) {
            clickCount = 0;
            await sendTestNotification();
        }
    });

    // تحميل الصفحة
    window.onload = async () => {
        await updateVerseUI();
        
        const savedTime = localStorage.getItem('verse_time');
        if (savedTime) {
            document.getElementById('notify-time').value = savedTime;
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `✅ النظام نشط - التذكير الساعة ${savedTime}`;
            statusDiv.classList.add('show');
            startChecking();
            setTimeout(() => statusDiv.classList.remove('show'), 3000);
        }
    };
</script>
</body>
</html>

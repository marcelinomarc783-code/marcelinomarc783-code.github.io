
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <title>آية اليوم - Orthodox</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/progressier.json"/>
    <script defer src="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/script.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #2c3e50; --gold: #c9a03d; }
        body { 
            font-family: 'Amiri', serif; 
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card { 
            background: rgba(255,255,255,0.97); padding: 35px 25px; 
            border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            text-align: center; max-width: 450px; width: 100%;
        }
        h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; }
        .sub { color: #666; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #eee; display: inline-block; padding-bottom: 5px; }
        .verse-box { min-height: 150px; display: flex; flex-direction: column; justify-content: center; }
        .verse-text { 
            font-size: 1.6rem; color: #222; margin: 15px 0; font-weight: bold; line-height: 1.7; 
            background: #f9f9f9; padding: 25px; border-radius: 20px; border-right: 6px solid var(--gold);
        }
        .verse-ref { color: var(--gold); font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; }
        .time-input { 
            font-size: 1.3rem; padding: 12px; border: 2px solid var(--primary); border-radius: 50px; 
            width: 85%; margin: 15px 0; text-align: center; color: var(--primary); font-family: 'Amiri', serif;
        }
        .btn { 
            background: linear-gradient(135deg, var(--primary), #1a252f); color: white; border: none; 
            padding: 15px 25px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 1.1rem; 
            font-family: 'Amiri', serif; transition: 0.3s; margin-top: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:active { transform: scale(0.96); }
        #status { color: #27ae60; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 50px; background: #e8f5e9; display: none; }
        #status.show { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    </style>
</head>
<body>

<div class="card">
    <h1>📖 آية اليوم</h1>
    <div class="sub">تطبيق Orthodox</div>
    
    <div id="verse-box" class="verse-box">
        <div class="verse-text" id="v-text">جاري تحميل كلمة الله...</div>
        <div class="verse-ref" id="v-ref"></div>
    </div>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    <p style="font-weight: bold; color: var(--primary);">⏰ وقت التذكير اليومي:</p>
    <input type="time" id="notify-time" class="time-input" value="08:00">
    <button class="btn" id="setupBtn">🔔 حفظ وتفعيل الإشعارات</button>
    <div id="status"></div>
</div>

<script>
    // 1. وظيفة جلب الآية
    async function fetchVerse() {
        try {
            const res = await fetch(`https://arabic-bible.onrender.com/api?book=${Math.floor(Math.random()*66)+1}&ch=1&ver=${Math.floor(Math.random()*10)+1}`);
            const data = await res.json();
            return { text: data.verse, ref: data.bookName || "الكتاب المقدس" };
        } catch {
            return { text: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", ref: "فيلبي 4:13" };
        }
    }

    // 2. تحديث الشاشة بالآية
    async function updateVerseUI() {
        const vText = document.getElementById('v-text');
        const vRef = document.getElementById('v-ref');
        const verse = await fetchVerse();
        vText.innerText = `"${verse.text}"`;
        vRef.innerText = verse.ref;
    }

    // 3. وظيفة الزر (إصلاح مشكلة عدم الاستجابة)
    document.getElementById('setupBtn').addEventListener('click', async () => {
        console.log("تم الضغط على زر التفعيل");
        
        try {
            const permission = await Notification.requestPermission();
            
            if (permission === "granted") {
                const time = document.getElementById('notify-time').value;
                localStorage.setItem('user_reminder_time', time);
                
                // تحديث بيانات المستخدم في Progressier
                if (window.progressier) {
                    window.progressier.updateMetadata({ reminder_time: time });
                }

                // إظهار رسالة النجاح
                const statusDiv = document.getElementById('status');
                statusDiv.innerHTML = `✅ تم الحفظ! ستصلك الآية الساعة ${time}`;
                statusDiv.classList.add('show');
                setTimeout(() => statusDiv.classList.remove('show'), 5000);
                
                // تجربة إرسال إشعار فوري للتأكد من الصلاحية
                if ('serviceWorker' in navigator) {
                    const reg = await navigator.serviceWorker.ready;
                    reg.showNotification("📖 تم ضبط التنبيه", {
                        body: `تطبيقك جاهز لإرسال الآيات يومياً الساعة ${time}`,
                        icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png"
                    });
                }
            } else {
                alert("يرجى السماح بالإشعارات من إعدادات المتصفح ليعمل المنبه.");
            }
        } catch (e) {
            alert("حدث خطأ تقني، يرجى المحاولة مرة أخرى.");
            console.error(e);
        }
    });

    // 4. عند فتح البرنامج
    window.onload = async () => {
        await updateVerseUI();
        const savedTime = localStorage.getItem('user_reminder_time');
        if (savedTime) {
            document.getElementById('notify-time').value = savedTime;
        }
    };
</script>
</body>
</html>
